name: Release

on:
  push:
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or branch to build (e.g., v1.0.0 or main)'
        required: false
        type: string
        default: 'main'
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.41.x'
  ANDROID_API_LEVEL: '36'  # Android 16 beta
  ANDROID_NDK_VERSION: '27.3.13750724'  # NDK r27d

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. System-level setup (Java, Android SDK, Flutter — not managed by pixi)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-${{ env.ANDROID_API_LEVEL }} ndk;${{ env.ANDROID_NDK_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      # 2. Checkout + pixi (manages rust, just, nodejs, pnpm, python, gh, lefthook)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true

      # 3. Signing (must happen before just ci → build-apk)
      - name: Setup signing
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then echo "::error::KEYSTORE_BASE64 secret is not set"; exit 1; fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then echo "::error::KEYSTORE_PASSWORD secret is not set"; exit 1; fi
          if [ -z "$KEY_PASSWORD" ]; then echo "::error::KEY_PASSWORD secret is not set"; exit 1; fi
          echo "$KEYSTORE_BASE64" | base64 -d > platforms/android/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 4. CI pipeline: setup-tools (pkl) → deps → gen → lint → test → build-apk
      - name: Run CI Pipeline
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          pixi run just ci
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          DISABLE_OPENCOLLECTIVE: true
          ADBLOCK: true

      # 5. Artifacts & release
      - name: Generate SHA256 checksums
        run: |
          cd build/app/outputs/apk/release
          for apk in webfly-v*.apk; do
            sha256sum "$apk" > "${apk}.sha256"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webfly-release-apk
          path: |
            build/app/outputs/apk/release/*.apk
            build/app/outputs/apk/release/*.sha256
          if-no-files-found: warn

      - name: Generate changelog with AI
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}"
          pixi run just gen-changelog --tag "$TAG" --output /tmp/changelog.md

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
          files: |
            build/app/outputs/apk/release/webfly-v*.apk
            build/app/outputs/apk/release/webfly-v*.sha256
            build/app/outputs/bundle/release/webfly-v*.aab
          body_path: /tmp/changelog.md
          fail_on_unmatched_files: false
